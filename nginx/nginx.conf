events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # Route API traffic to the backend container
        location /api/ {
            proxy_pass http://backend:2222/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Allow large PDF uploads
            client_max_body_size 20M;

            # Long timeouts for AI processing
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }

        # Route all other traffic to the frontend container
        location / {
            proxy_pass http://frontend:1111/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # WebSocket support for Vite HMR (if needed in dev)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
